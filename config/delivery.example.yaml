# Delivery configuration (R14, R15, R16) — fixed routing, not an abstraction.
# Routing is a two-branch inline condition (KTD1): urgent → immediate; else digest.

# Filesystem roots (KTD5). DB file enforced 0600, artifact dir enforced 0700.
state_db_path: ./var/state.sqlite3
artifact_root: ./var/artifacts

# Max subscriber token validity (R20) — used by U15 server (Phase 1), declared here.
token_max_age_days: 90

# Daily digest send hour (local, 24h). Phase 1 scheduler reads this.
digest_hour: 9

# --- Optional outbound delivery (U1, KTD-D) -------------------------------
# RSS is the primary private channel (R14); the email leg is OPTIONAL and only
# activates when BOTH email_recipients AND smtp_host are set. With neither, the
# deployment is RSS-only (legitimate) — but high-risk alerts then go out via RSS
# only, and the scheduler logs a one-time warning at registration (KTD-D).
#
# email_recipients accepts a single address or a list:
#   email_recipients: alerts@example.com
#   email_recipients:
#     - alerts@example.com
#     - oncall@example.com
# smtp_host: smtp.example.com
#
# feed_dir: where the private Atom feed is written. When omitted, the pipeline
# derives <artifact_root>/_feed automatically.
# feed_dir: ./var/feed
